<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ज्ञान सागर साइंस क्विज</title>

<meta name="description" content="ज्ञान सागर साइंस क्विज - 51 विज्ञान प्रश्न, उत्तर और कारण सहित।">

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>

<body>
<header class="header">
   <img src="icon-192.png" alt="Gyan Sagar Logo" class="logo">
  <h1>ज्ञान सागर साइंस क्विज</h1>
  <p>51 महत्वपूर्ण विज्ञान प्रश्न • उत्तर • कारण</p>
</header>
<main class="container">

<section id="homeScreen">

<h2>स्वागत है</h2>

<p>
यह क्विज विद्यार्थियों के लिए बनाया गया है।
प्रत्येक प्रश्न का सही उत्तर देने के बाद उसका कारण भी दिखाया जाएगा।
</p>
   <input
  type="text"
  id="playerName"
  placeholder="👤 अपना नाम लिखें"
  style="width:100%;padding:12px;margin:15px 0;font-size:16px;border-radius:8px;border:1px solid #ccc;">

<button id="startQuiz">
🚀 क्विज प्रारम्भ करें
</button>

</section>

<section id="quizScreen" style="display:none;">

<h2 id="questionNumber"></h2>

<h3 id="questionText"></h3>

<div id="options"></div>

<div class="quiz-controls">
    <button id="homeBtn">🏠 Home</button>
    <button id="prevBtn">⬅ Previous</button>
    <button id="nextBtn">Next ➜</button>
</div>

</section>

<section id="resultScreen" style="display:none;">

<h2>🎉 परिणाम</h2>

<h3 id="scoreText" class="result-animation"></h3>
   <div id="progressCircle"></div>
   <button id="certificateBtn">
🏅 Certificate Download
   </button>

<button onclick="location.reload()">
फिर से शुरू करें
</button>

</section>

</main>

<script src="script.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</body>
  </html>
